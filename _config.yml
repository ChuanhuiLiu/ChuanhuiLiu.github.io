# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "Chuanhui Liu" 
masthead_title: " "
# subtitle: "blog and portfolio"
# description: >- # this means to ignore newlines until "baseurl:"
#   Welcome to Chuanhui Liu's blog and portfolio.
minimal_mistakes_skin: "dirt"
minimal_mistakes_skin2: "dark"
search: true
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-FEKVEJ7H3D"
# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: mathjax
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

webrick:
  mime_types:
    video/mp4: [mp4]
    video/webm: [webm]

# Outputting

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-admin

author:
  name   : "Chuanhui Liu"
  avatar : "/assets/images/bio-photo.png"
  bio    : "Email: chuanhui.liu1994@gmail.com"
  location : "Indianapolis, IN"
  linkedin: /chuanhuiliu 
  github: /ChuanhuiLiu
# logo: "/assets/images/logo.jpg" logo for masthead

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ChuanhuiLiu"


defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: false
      show_date: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
  # _tools
  - scope:
      path: ""
      type: tools
    values:
      layout: single
      author_profile: false
      share: true

collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
  tools:
    output: true
    permalink: /:collection/:path/
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
